<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Trishika Car Rental Hubli</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0A0A0A;
      color: #F5F0E8;
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap { max-width: 540px; }
    .big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(7rem, 25vw, 14rem);
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px #FF5500;
      letter-spacing: 0.04em;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      letter-spacing: 0.06em;
      margin: 1rem 0 0.8rem;
    }
    p { color: #888; font-size: 0.95rem; line-height: 1.7; margin-bottom: 2rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #FF5500;
      color: #0A0A0A;
      text-decoration: none;
      font-family: 'Outfit', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.9rem 2rem;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      transition: background 0.2s;
      margin: 0 0.4rem;
    }
    .btn:hover { background: #F5F0E8; }
    .btn-outline {
      background: transparent;
      color: #F5F0E8;
      border: 1.5px solid rgba(255,255,255,0.2);
    }
    .btn-outline:hover { background: #F5F0E8; color: #0A0A0A; }
    .line { width: 48px; height: 2px; background: #FF5500; margin: 1.5rem auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="big">404</div>
    <div class="line"></div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br>Let's get you back on the road.</p>
    <a href="/" class="btn">← Back to Home</a>
    <a href="tel:+918217577849" class="btn btn-outline">Call Us</a>
  </div>
</body>
</html>
